<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="title">Rock Paper Scissors</div>
    <div class="subtitle">First to 5 wins</div>

    <div class="scoreboard">
      <div class="score-block">
        <div class="score-label">You</div>
        <div class="score-num" id="humanScore">0</div>
      </div>
      <div class="score-divider">vs</div>
      <div class="score-block">
        <div class="score-label">Computer</div>
        <div class="score-num" id="computerScore">0</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="choice-btn" id="rockBtn">Rock</button>
      <button class="choice-btn" id="paperBtn">Paper</button>
      <button class="choice-btn" id="scissorsBtn">Scissors</button>
    </div>

    <div id="results">
      <p class="waiting">Pick your move to start</p>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
